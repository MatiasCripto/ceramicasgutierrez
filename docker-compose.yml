services:
  postgres:
    image: postgres:16-alpine
    container_name: evolution-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution_pass
      POSTGRES_DB: evolution
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: evolution-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: evolution-ceramicas
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
    environment:
      AUTHENTICATION_API_KEY: "57A0ACEDB3CF-413A-A746-E7D1825C8EF8"
      DATABASE_PROVIDER: "postgresql"
      DATABASE_CONNECTION_URI: "postgresql://evolution:evolution_pass@postgres:5432/evolution"
      CACHE_REDIS_URI: "redis://redis:6379"
      WEBHOOK_URL: "http://host.docker.internal:3010/api/webhooks/whatsapp"
      WEBHOOK_ENABLED: "true"
      WEBHOOK_EVENTS: "MESSAGES_UPSERT,MESSAGES_UPDATE,CONNECTION_UPDATE"
      LOG_LEVEL: "ERROR,WARN,DEBUG,INFO,LOG,VERBOSE,DARK,WEBHOOKS,WEBSOCKET"
      LANGUAGE: "pt-BR"
      CONFIG_SESSION_PHONE_CLIENT: "Evolution API"
      CONFIG_SESSION_PHONE_NAME: "Ceramicas Gutierrez"
    volumes:
      - evolution_data:/evolution/instances

volumes:
  pgdata:
  evolution_data: